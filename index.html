<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Product Comparator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <header>
      <h1>🛒 Smart Product Comparator</h1>
      <p>Compare products and choose the best one</p>
    </header>

    <div class="grid">

      <div class="card">
        <h3>iPhone 15</h3>
        <p>💰 $999</p>
        <span>⭐ 4.8 Rating</span>
        <span>🔋 3200 mAh</span>
        <span>💾 128GB</span>
      </div>

      <div class="card highlight">
        <h3>Samsung S24</h3>
        <p>💰 $899</p>
        <span>⭐ 4.6 Rating</span>
        <span>🔋 4000 mAh</span>
        <span>💾 256GB</span>
      </div>

      <div class="card">
        <h3>Pixel 8</h3>
        <p>💰 $799</p>
        <span>⭐ 4.5 Rating</span>
        <span>🔋 3800 mAh</span>
        <span>💾 128GB</span>
      </div>

    </div>

  </div>

</body>
</html>
